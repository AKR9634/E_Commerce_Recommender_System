version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile : API/Dockerfile
    container_name: recommender_api
    ports:
      - "8000:8000"
  frontend:
    build:
      context: .
      dockerfile: FRONTEND/Dockerfile
    container_name: recommender_frontend
    ports:
      - "8501:8501"
    depends_on:
      - api

